<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SalonOS HQ Dashboard</title>

<style>

body{
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI";
margin:0;
background:#f5f6fa;
}

.header{
background:white;
padding:16px 24px;
border-bottom:1px solid #eee;
}

.container{
padding:24px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:24px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,0.05);
}

.big{
font-size:28px;
font-weight:700;
}

.table{
background:white;
border-radius:10px;
padding:16px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="header">
<h2>SalonOS HQ Dashboard</h2>
</div>

<div class="container">

<div class="cards">

<div class="card">
<div>未返信口コミ</div>
<div class="big">12</div>
</div>

<div class="card">
<div>投稿不足店舗</div>
<div class="big">7</div>
</div>

<div class="card">
<div>危険店舗</div>
<div class="big">3</div>
</div>

<div class="card">
<div>平均Google順位</div>
<div class="big">5.2</div>
</div>

</div>

<div class="table">

<h3>店舗ランキング</h3>

<div class="row">
<span>AVANCE 深井</span>
<span>score 82</span>
</div>

<div class="row">
<span>AVANCE 鳳</span>
<span>score 65</span>
</div>

<div class="row">
<span>AVANCE 泉大津 ⚠</span>
<span>score 42</span>
</div>

</div>

</div>

</body>
</html>
