<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>危険店舗ランキング</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
margin:0;
background:#f5f6fa;
}

.header{
background:white;
padding:16px 24px;
border-bottom:1px solid #eee;
}

.container{
padding:24px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 1px 4px rgba(0,0,0,0.05);
}

.row{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid #eee;
}

.rank{
font-weight:700;
width:40px;
}

.name{
flex:1;
}

.badge{
background:#ffe5e5;
color:#b30000;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-left:10px;
}

.score{
font-weight:700;
}

</style>
</head>

<body>

<div class="header">
<h2>危険店舗ランキング</h2>
</div>

<div class="container">

<div class="card">

<div class="row">
<div class="rank">1</div>
<div class="name">
AVANCE 泉大津
<span class="badge">未返信口コミ 6</span>
<span class="badge">投稿なし</span>
</div>
<div class="score">score 42</div>
</div>

<div class="row">
<div class="rank">2</div>
<div class="name">
AVANCE 鳳
<span class="badge">未返信口コミ 3</span>
<span class="badge">投稿不足</span>
</div>
<div class="score">score 58</div>
</div>

<div class="row">
<div class="rank">3</div>
<div class="name">
AVANCE 梅田
<span class="badge">順位低下</span>
</div>
<div class="score">score 65</div>
</div>

</div>

</div>

</body>
</html>
