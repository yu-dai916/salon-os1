<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>本部ダッシュボード</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
padding:20px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border-bottom:1px solid #eee;
padding:10px;
text-align:left;
}

.bad{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<h1>本部ダッシュボード</h1>

<table>

<tr>
<th>店舗</th>
<th>口コミ</th>
<th>低評価</th>
<th>投稿</th>
<th>タスク</th>
<th></th>
</tr>

{% for r in rows %}

<tr>

<td>{{ r.name }}</td>

<td>{{ r.reviews }}</td>

<td class="{% if r.low_reviews > 0 %}bad{% endif %}">
{{ r.low_reviews }}
</td>

<td>{{ r.posts }}</td>

<td>{{ r.tasks }}</td>

<td>
<a href="/store/{{ r.id }}/page">店舗</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
