<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>本部コントロール</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
padding:20px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border-bottom:1px solid #eee;
padding:10px;
text-align:left;
}

th{
background:#f5f5f5;
}

a{
text-decoration:none;
color:#333;
}

</style>
</head>

<body>

<h1>本部コントロール</h1>

<table>

<tr>
<th>店舗</th>
<th>状態</th>
<th>未返信口コミ</th>
<th>投稿下書き</th>
<th>Google順位</th>
</tr>

{% for r in rows %}

<tr>

<td>
<a href="/store_dashboard/{{ r.store_id }}">
{{ r.store }}
</a>
</td>

<td>{{ r.status }}</td>

<td>{{ r.unreplied }}</td>

<td>{{ r.drafts }}</td>

<td>
{% if r.rank %}
{{ r.rank }}位
{% else %}
-
{% endif %}
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
