<!doctype html>
<html>

<head>

<meta charset="utf-8">

<title>SERP競合分析</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.rank{
font-weight:bold;
}

</style>

</head>

<body>

<h1>SERP競合分析</h1>

<table>

<tr>
<th>順位</th>
<th>店舗</th>
<th>評価</th>
<th>口コミ数</th>
</tr>

{% for r in rows %}

<tr>

<td class="rank">{{ r.position }}</td>

<td>{{ r.name }}</td>

<td>{{ r.rating }}</td>

<td>{{ r.review_count }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
