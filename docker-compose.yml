version: "3.9"

services:

  api:
    build: .
    container_name: gbp_api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/gbp
      OPENAI_API_KEY=${OPENAI_API_KEY}
      SERPAPI_KEY: df564fa99619ff3c9732224d413df21327fa776fc8c052a869a8cfd10e4d13b6
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: gbp_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gbp
    ports:
      - "5432:5432"
    volumes:
      - gbp_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gbp_redis
    restart: always
    ports:
      - "6379:6379"

  scheduler:
    build: .
    container_name: gbp_scheduler
    restart: always
    env_file:
      - .env
    command: ["python", "-m", "app.scheduler"]
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: gbp_worker
    restart: always
    env_file:
      - .env
    command: ["rq", "worker", "-u", "redis://redis:6379/0", "gbp"]
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  gbp_pgdata: